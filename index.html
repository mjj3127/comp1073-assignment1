<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>See 'N' Say Storymaker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>See 'N' Say Storymaker</h1>
    <p>Click each button to choose words and build your story.</p>

    <section class="toy">
      <div id="output">Your story will appear here.</div>

      <button id="whoBtn">Who?</button>
      <button id="actionBtn">Did what?</button>
      <button id="placeBtn">Where?</button>
      <button id="objectBtn">With what?</button>
      <button id="endingBtn">Ending</button>
    </section>

    <section class="controls">
      <button id="storyBtn">Show Story</button>
      <button id="randomBtn">Random Story</button>
      <button id="resetBtn">Reset</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
